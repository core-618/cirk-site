<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g fill="#2a2a2a" opacity="0.5">
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="300" cy="100" r="1.5"/>
    <circle cx="400" cy="100" r="1.5"/>
    <circle cx="500" cy="100" r="1.5"/>
    <circle cx="600" cy="100" r="1.5"/>
    <circle cx="700" cy="100" r="1.5"/>
    <circle cx="800" cy="100" r="1.5"/>
    <circle cx="900" cy="100" r="1.5"/>
    <circle cx="1000" cy="100" r="1.5"/>
    <circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/>
    <circle cx="200" cy="200" r="1.5"/>
    <circle cx="300" cy="200" r="1.5"/>
    <circle cx="400" cy="200" r="1.5"/>
    <circle cx="500" cy="200" r="1.5"/>
    <circle cx="600" cy="200" r="1.5"/>
    <circle cx="700" cy="200" r="1.5"/>
    <circle cx="800" cy="200" r="1.5"/>
    <circle cx="900" cy="200" r="1.5"/>
    <circle cx="1000" cy="200" r="1.5"/>
    <circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/>
    <circle cx="200" cy="300" r="1.5"/>
    <circle cx="300" cy="300" r="1.5"/>
    <circle cx="400" cy="300" r="1.5"/>
    <circle cx="500" cy="300" r="1.5"/>
    <circle cx="600" cy="300" r="1.5"/>
    <circle cx="700" cy="300" r="1.5"/>
    <circle cx="800" cy="300" r="1.5"/>
    <circle cx="900" cy="300" r="1.5"/>
    <circle cx="1000" cy="300" r="1.5"/>
    <circle cx="1100" cy="300" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/>
    <circle cx="200" cy="400" r="1.5"/>
    <circle cx="300" cy="400" r="1.5"/>
    <circle cx="400" cy="400" r="1.5"/>
    <circle cx="500" cy="400" r="1.5"/>
    <circle cx="600" cy="400" r="1.5"/>
    <circle cx="700" cy="400" r="1.5"/>
    <circle cx="800" cy="400" r="1.5"/>
    <circle cx="900" cy="400" r="1.5"/>
    <circle cx="1000" cy="400" r="1.5"/>
    <circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/>
    <circle cx="200" cy="500" r="1.5"/>
    <circle cx="300" cy="500" r="1.5"/>
    <circle cx="400" cy="500" r="1.5"/>
    <circle cx="500" cy="500" r="1.5"/>
    <circle cx="600" cy="500" r="1.5"/>
    <circle cx="700" cy="500" r="1.5"/>
    <circle cx="800" cy="500" r="1.5"/>
    <circle cx="900" cy="500" r="1.5"/>
    <circle cx="1000" cy="500" r="1.5"/>
    <circle cx="1100" cy="500" r="1.5"/>
  </g>

  <!-- Accent line divider -->
  <rect x="100" y="340" width="1000" height="1" fill="url(#accentLine)" opacity="0.4"/>

  <!-- Logo mark -->
  <text x="100" y="230" font-family="'IBM Plex Mono', 'SF Mono', 'Menlo', monospace" font-size="96" font-weight="500">
    <tspan fill="#2563EB">C</tspan><tspan fill="#e0e0e0"> • </tspan><tspan fill="#10B981">I</tspan><tspan fill="#e0e0e0"> • </tspan><tspan fill="#F59E0B">R</tspan><tspan fill="#e0e0e0"> • </tspan><tspan fill="#8B5CF6">K</tspan>
  </text>

  <!-- Tagline -->
  <text x="100" y="285" font-family="'Inter', -apple-system, sans-serif" font-size="28" fill="#a0a0a0" letter-spacing="0.5">
    Execution model for AI-native development
  </text>

  <!-- Vector example chips -->
  <g transform="translate(100, 380)">
    <!-- C chip -->
    <rect x="0" y="0" width="110" height="44" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
    <text x="20" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#2563EB">C</text>
    <text x="42" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#ebebeb">Context</text>

    <!-- I chip -->
    <rect x="130" y="0" width="120" height="44" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
    <text x="150" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#10B981">I</text>
    <text x="170" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#ebebeb">Iteration</text>

    <!-- R chip -->
    <rect x="270" y="0" width="110" height="44" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
    <text x="290" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#F59E0B">R</text>
    <text x="310" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#ebebeb">Review</text>

    <!-- K chip -->
    <rect x="400" y="0" width="160" height="44" rx="8" fill="#1c1c1c" stroke="#2a2a2a" stroke-width="1"/>
    <text x="420" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#8B5CF6">K</text>
    <text x="442" y="29" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#ebebeb">Integration</text>
  </g>

  <!-- Vector example -->
  <rect x="100" y="460" width="280" height="40" rx="6" fill="rgba(37, 99, 235, 0.08)" stroke="rgba(42, 42, 42, 1)" stroke-width="1"/>
  <text x="120" y="487" font-family="'IBM Plex Mono', monospace" font-size="17" letter-spacing="2">
    <tspan fill="#2563EB">C2</tspan><tspan fill="#6b6b6b">  </tspan><tspan fill="#10B981">I3</tspan><tspan fill="#6b6b6b">  </tspan><tspan fill="#F59E0B">R1</tspan><tspan fill="#6b6b6b">  </tspan><tspan fill="#8B5CF6">K2</tspan>
  </text>

  <!-- Domain -->
  <text x="1100" y="575" font-family="'IBM Plex Mono', monospace" font-size="16" fill="#6b6b6b" text-anchor="end">cirk.dev</text>

  <!-- Open standard badge -->
  <rect x="100" y="555" width="130" height="30" rx="6" fill="rgba(16, 185, 129, 0.10)" stroke="rgba(16, 185, 129, 0.25)" stroke-width="1"/>
  <text x="118" y="575" font-family="'IBM Plex Mono', monospace" font-size="12" fill="#10B981">PROPOSED v0.1</text>
</svg>
